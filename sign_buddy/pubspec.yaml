name: sign_buddy
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  camera: ^0.11.0+2
  tflite_flutter: ^0.12.1
  image: ^4.0.17
  camera_web: ^0.3.5+2
  image_picker: ^1.1.1
  google_fonts: ^6.0.0
  lottie: ^2.2.0
  another_flushbar: ^1.12.30
  firebase_core: ^2.30.0
  firebase_auth: ^4.17.0
  url_launcher: ^6.2.5
  sqflite: ^2.3.0
  path: ^1.9.0
  cloud_firestore: ^4.15.0
  google_generative_ai: ^0.4.6
  flutter_dotenv: ^5.1.0
  cupertino_icons: ^1.0.8
  flutter_tts: ^4.0.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/models/ccn_model.tflite
    - assets/models/asl_alphabet_model.tflite
    - assets/models/sign_buddy_model.tflite
    - assets/models/labels.json
    - assets/.env

  fonts:
    - family: PermanentMarker
      fonts:
        - asset: assets/fonts/PermanentMarker-Regular.ttf
          weight: 700

    - family: Pacifico
      fonts:
        - asset: assets/fonts/Pacifico-Regular.ttf
          weight: 700